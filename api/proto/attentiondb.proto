syntax = "proto3";

package attentiondb;

service AttentionDB {
    rpc Attend (AttendRequest) returns (AttendResponse);
    rpc Insert (InsertRequest) returns (InsertResponse);
    rpc Delete (DeleteRequest) returns (DeleteResponse);
    rpc HealthCheck (HealthRequest) returns (HealthResponse);
    rpc CreateCollection (CreateCollectionRequest) returns (CreateCollectionResponse);
    rpc GetCollectionSettings (GetCollectionSettingsRequest) returns (GetCollectionSettingsResponse);
    rpc AlterCollection (AlterCollectionRequest) returns (AlterCollectionResponse);
}

message AttendRequest {
    string collection = 1;
    string query = 2;
    repeated string heads = 3;
    uint32 top_k = 4;
    float min_weight = 5;
    optional float temporal_decay = 6;
}

message AttendResponse {
    repeated Result results = 1;
    double latency_ms = 2;
    float effective_sample_size = 3;
}

message Result {
    string id = 1;
    float score = 2;
    map<string, string> fields = 3;
}

message InsertRequest {
    string collection = 1;
    map<string, string> fields = 2;
}

message InsertResponse {
    string id = 1;
    bool success = 2;
}

message DeleteRequest {
    string collection = 1;
    string id = 2;
}

message DeleteResponse {
    bool success = 1;
}

message HealthRequest {}
message HealthResponse {
    string status = 1;
    string version = 2;
}

message CollectionSettings {
    uint32 ef_search = 1;
    uint32 ef_construction = 2;
    uint32 max_connections = 3;
    string similarity = 4;
    bool exact_rerank = 5;
    bool enable_gpu_fusion = 6;
}

message FieldDefinition {
    string name = 1;
    string type = 2;
}

message CreateCollectionRequest {
    string collection = 1;
    repeated FieldDefinition fields = 2;
    optional CollectionSettings settings = 3;
}

message CreateCollectionResponse {
    bool success = 1;
    string message = 2;
}

message GetCollectionSettingsRequest {
    string collection = 1;
}

message GetCollectionSettingsResponse {
    optional CollectionSettings settings = 1;
}

message AlterCollectionRequest {
    string collection = 1;
    CollectionSettings settings = 2;
}

message AlterCollectionResponse {
    bool success = 1;
    string message = 2;
}
