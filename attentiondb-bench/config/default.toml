[general]
random_seed     = 42
vector_dimension = 128
warmup_runs     = 5
bootstrap_resamples = 10_000
confidence_level = 0.95
data_dir        = "datasets/"
output_dir      = "results/"

[translation]
primary_strategy   = "SemanticOnly"
sensitivity_strategies = ["Concatenation"]

[run_protocol]
tier1_max_scale = 100_000
tier2_max_scale = 1_000_000
tier1_full_runs = 30
tier2_index_builds = 5
tier2_queries_per_build = 6
tier3_query_runs = 30

[pareto_sweep]
ef_search_values = [10, 20, 40, 80, 100, 150, 200, 400, 800]
queries_per_point = 1000
reps_per_point = 5
target_recalls = [0.90, 0.95, 0.99]
concurrency = 1

[throughput]
concurrency_levels = [1, 2, 4, 8, 16, 32, 64]
warmup_duration_secs = 10
measurement_duration_secs = 60

[network_calibration]
enabled = true
num_null_queries = 1000

[power_analysis]
effect_sizes = [0.2, 0.5, 0.8]
desired_power = 0.80
estimated_num_comparisons = 100

[scales]
values = [2_000, 10_000, 25_000, 50_000, 100_000, 250_000, 500_000, 1_000_000]

[difficulties]
values = ["Easy", "Medium", "Hard", "VeryHard", "SuperHard", "ExtremelyHard"]

[databases]
attentiondb_cpu = { enabled = true, host = "localhost", port = 7070, transport = "LocalGrpc" }
attentiondb_gpu = { enabled = false, host = "localhost", port = 7071, transport = "LocalGrpc", requires_cuda = true }
qdrant          = { enabled = true,  host = "localhost", port = 6334, transport = "LocalGrpc" }
milvus          = { enabled = false, host = "localhost", port = 19530, transport = "LocalGrpc" }
weaviate        = { enabled = false, host = "localhost", port = 8080, transport = "LocalRest" }
pgvector        = { enabled = true,  host = "localhost", port = 5432, transport = "LocalTcp" }
elasticsearch   = { enabled = false, host = "localhost", port = 9200, transport = "LocalRest" }
pinecone        = { enabled = false, host = "", port = 0, transport = "Cloud", note = "Cloud latency is not comparable to local systems" }

[experiments]
run_standard       = true
run_head_ablations = true
run_failure_modes  = true
run_ann_benchmark_compat = true

[real_datasets]
sift128    = { enabled = true,  path = "datasets/sift-128-euclidean.hdf5" }
glove100   = { enabled = true,  path = "datasets/glove-100-angular.hdf5" }
nytimes256 = { enabled = true,  path = "datasets/nytimes-256-angular.hdf5" }
gist960    = { enabled = false, path = "datasets/gist-960-euclidean.hdf5", note = "960-dim is expensive; enable for camera-ready" }
